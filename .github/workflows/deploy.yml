name: Deploy com Firebase Config Seguro

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      id: checkout
      uses: actions/checkout@v4
      continue-on-error: true

    - name: Fallback clone
      if: steps.checkout.outcome == 'failure'
      run: |
        echo "Checkout falhou, a tentar clone manual..."
        rm -rf "$GITHUB_WORKSPACE"/*
        git clone --depth 1 "https://github.com/${{ github.repository }}.git" "$GITHUB_WORKSPACE"
    
    # Criar arquivos firebase-config com secrets
    - name: Criar firebase-config.js
      run: |
        mkdir -p assets
        cat > firebase-config.js << 'EOF'
        window.firebaseConfig = {
          apiKey: "${{ secrets.FIREBASE_API_KEY }}",
          authDomain: "chat-viciadocomenta.firebaseapp.com",
          databaseURL: "https://chat-viciadocomenta-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "chat-viciadocomenta",
          storageBucket: "chat-viciadocomenta.firebasestorage.app",
          messagingSenderId: "183684670526",
          appId: "1:183684670526:web:64b1f62cf80e05d4781d6f"
        };
        EOF
        cat > firebase-config.json << 'EOF'
        {
          "apiKey": "${{ secrets.FIREBASE_API_KEY }}",
          "authDomain": "chat-viciadocomenta.firebaseapp.com",
          "databaseURL": "https://chat-viciadocomenta-default-rtdb.europe-west1.firebasedatabase.app",
          "projectId": "chat-viciadocomenta",
          "storageBucket": "chat-viciadocomenta.firebasestorage.app",
          "messagingSenderId": "183684670526",
          "appId": "1:183684670526:web:64b1f62cf80e05d4781d6f"
        }
        EOF
        cat > assets/firebase-config.js << 'EOF'
        // ✅ CONFIGURAÇÃO FIREBASE SEGURA (Gerada automaticamente)
        // Data: $(date)
        // 
        // ✅ SEGURANÇA APLICADA:
        // - API Key armazenada em GitHub Secrets
        // - HTTP Referrers restritos a: viciadocomenta.pt
        // - APIs restritas a: Identity Toolkit, Token Service, Firebase Realtime Database

        window.firebaseConfig = {
          apiKey: "${{ secrets.FIREBASE_API_KEY }}",
          authDomain: "chat-viciadocomenta.firebaseapp.com",
          databaseURL: "https://chat-viciadocomenta-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "chat-viciadocomenta",
          storageBucket: "chat-viciadocomenta.firebasestorage.app",
          messagingSenderId: "183684670526",
          appId: "1:183684670526:web:64b1f62cf80e05d4781d6f"
        };

        const firebaseConfig = window.firebaseConfig;

        // Inicializar Firebase
        function initializeFirebaseApp() {
          if (typeof firebase === 'undefined') {
            console.log('⏳ Aguardando Firebase SDK carregar...');
            setTimeout(initializeFirebaseApp, 50);
            return;
          }
          
          try {
            if (!firebase.apps.length) {
              firebase.initializeApp(firebaseConfig);
              console.log('✓ Firebase inicializado com sucesso');
              
              // Definir flag global de inicialização
              window.firebaseInitialized = true;
              
              // Analytics de visitas após inicialização
              try {
                const db = firebase.database();
                const today = new Date().toISOString().split('T')[0];
                const month = new Date().toISOString().substring(0,7);
                const statsRef = db.ref('site_stats');
                
                statsRef.transaction(data => {
                  if(!data) data = {total_visits:0, daily:{}, monthly:{}, last_updated:new Date().toISOString()};
                  data.total_visits = (data.total_visits||0) + 1;
                  if(!data.daily) data.daily = {};
                  data.daily[today] = (data.daily[today]||0) + 1;
                  if(!data.monthly) data.monthly = {};
                  data.monthly[month] = (data.monthly[month]||0) + 1;
                  data.last_updated = new Date().toISOString();
                  return data;
                });
                
                const userId = 'user_' + Math.random().toString(36).substr(2,9);
                const activeUserRef = db.ref('active_users/' + userId);
                activeUserRef.set({
                  timestamp: firebase.database.ServerValue.TIMESTAMP,
                  page: window.location.pathname
                });
                activeUserRef.onDisconnect().remove();
                window.addEventListener('beforeunload', () => activeUserRef.remove());
                
                console.log('✓ Analytics configurado');
              } catch (analyticsError) {
                console.error('❌ Erro no analytics:', analyticsError);
              }
            } else {
              window.firebaseInitialized = true;
              console.log('✓ Firebase já estava inicializado');
            }
          } catch (error) {
            console.error('Erro ao inicializar Firebase:', error);
          }
        }

        // Iniciar processo de inicialização
        initializeFirebaseApp();
        EOF
      env:
        FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

    - name: Gerar metadados de build
      run: |
        mkdir -p data
        cat > data/build-version.json << EOF
        {
          "version": "${{ github.sha }}",
          "shortVersion": "${{ github.sha }}",
          "builtAt": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
        }
        EOF
        sed -i "s/__VC_BUILD_VERSION__/${{ github.sha }}/g" artigos.html

    - name: Criar push-public-config.json
      env:
        WEB_PUSH_VAPID_PUBLIC_KEY: ${{ secrets.WEB_PUSH_VAPID_PUBLIC_KEY }}
      run: |
        mkdir -p data
        cat > data/push-public-config.json << EOF
        {
          "vapidPublicKey": "${WEB_PUSH_VAPID_PUBLIC_KEY}"
        }
        EOF
    
    # Deploy para GitHub Pages
    - name: Deploy para GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        cname: viciadocomenta.pt

    - name: Instalar dependências para Web Push
      if: github.ref == 'refs/heads/main'
      env:
        FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        WEB_PUSH_VAPID_PUBLIC_KEY: ${{ secrets.WEB_PUSH_VAPID_PUBLIC_KEY }}
        WEB_PUSH_VAPID_PRIVATE_KEY: ${{ secrets.WEB_PUSH_VAPID_PRIVATE_KEY }}
        WEB_PUSH_VAPID_SUBJECT: ${{ secrets.WEB_PUSH_VAPID_SUBJECT }}
      run: |
        if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ] || [ -z "$WEB_PUSH_VAPID_PUBLIC_KEY" ] || [ -z "$WEB_PUSH_VAPID_PRIVATE_KEY" ] || [ -z "$WEB_PUSH_VAPID_SUBJECT" ]; then
          echo "Web Push desativado neste deploy: faltam GitHub secrets."
          exit 0
        fi

        npm install --no-save firebase-admin@12.7.0 web-push@3.6.7

    - name: Disparar push do artigo mais recente
      if: github.ref == 'refs/heads/main'
      timeout-minutes: 5
      shell: bash
      run: |
        if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ] || [ -z "$WEB_PUSH_VAPID_PUBLIC_KEY" ] || [ -z "$WEB_PUSH_VAPID_PRIVATE_KEY" ] || [ -z "$WEB_PUSH_VAPID_SUBJECT" ]; then
          echo "Web Push desativado neste deploy: faltam GitHub secrets."
          exit 0
        fi

        node <<'NODE' > latest-push-payload.json
        const fs = require('fs');

        function parsePublicationDate(value) {
          if (!value || typeof value !== 'string') return 0;
          const [datePart, timePart = '00:00'] = value.trim().split(' ');
          const [day, month, year] = datePart.split('/').map(Number);
          const [hour, minute] = timePart.split(':').map(Number);
          if (!day || !month || !year) return 0;
          return new Date(year, month - 1, day, Number.isFinite(hour) ? hour : 0, Number.isFinite(minute) ? minute : 0, 0, 0).getTime();
        }

        function slugify(value) {
          return String(value || '')
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '')
            .replace(/-{2,}/g, '-');
        }

        const raw = JSON.parse(fs.readFileSync('data/noticias.json', 'utf8'));
        const noticias = Array.isArray(raw.noticias) ? raw.noticias : [];
        const latest = [...noticias]
          .sort((a, b) => parsePublicationDate(b.dataPublicacao || b.data) - parsePublicationDate(a.dataPublicacao || a.data))[0];

        if (!latest) {
          throw new Error('Sem noticias para notificar.');
        }

        const slug = latest.slug ? slugify(latest.slug) : slugify(latest.titulo);
        const articleUrl = latest.id
          ? `https://www.viciadocomenta.pt/artigos.html?id=${encodeURIComponent(String(latest.id).trim())}${slug ? `&slug=${encodeURIComponent(slug)}` : ''}`
          : `https://www.viciadocomenta.pt/artigos.html`;

        const payload = {
          articleKey: `${latest.id || slug}|${latest.dataPublicacao || latest.data || ''}`,
          title: '📰 Novo artigo publicado',
          body: latest.titulo || 'Já saiu um novo artigo no VICIADO COMENTA.',
          url: articleUrl,
          topic: 'all'
        };

        process.stdout.write(JSON.stringify(payload));
        NODE

        node ./tools/dispatch-web-push.js latest-push-payload.json
      env:
        FIREBASE_DATABASE_URL: https://chat-viciadocomenta-default-rtdb.europe-west1.firebasedatabase.app
        FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        WEB_PUSH_VAPID_PUBLIC_KEY: ${{ secrets.WEB_PUSH_VAPID_PUBLIC_KEY }}
        WEB_PUSH_VAPID_PRIVATE_KEY: ${{ secrets.WEB_PUSH_VAPID_PRIVATE_KEY }}
        WEB_PUSH_VAPID_SUBJECT: ${{ secrets.WEB_PUSH_VAPID_SUBJECT }}
        WEB_PUSH_REQUEST_TIMEOUT_MS: 10000
